name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: crates-io-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Verify release tag matches crate version
        if: github.event_name == 'release'
        run: |
          crate_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "blazox") | .version')
          release_tag='${{ github.event.release.tag_name }}'

          if [ "$release_tag" != "$crate_version" ] && [ "$release_tag" != "v$crate_version" ]; then
            echo "Release tag $release_tag does not match crate version $crate_version"
            exit 1
          fi

      - name: Verify package contents
        run: cargo package --locked

      - name: Publish to crates.io
        run: cargo publish --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
